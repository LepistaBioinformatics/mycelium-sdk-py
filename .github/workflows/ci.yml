name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev,fastapi]" pytest

      - name: Test
        run: pytest src/tests -q

      - name: Type check
        run: >-
          mypy --no-strict-optional --ignore-missing-imports
          --no-warn-incomplete-stub --allow-redefinition --implicit-optional
          --explicit-package-bases --namespace-packages --allow-untyped-defs
          src/myc_http_tools
