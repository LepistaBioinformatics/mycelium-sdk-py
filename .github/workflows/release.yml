name: Release

# Builds and publishes mycelium-http-tools to PyPI via Trusted Publishing (OIDC).
# No API token is stored. Runs when a version tag (v*) is pushed, when bump.yml
# dispatches it after an automatic bump, or when triggered manually from the
# Actions tab (to (re)publish the current version).
#
# Configure the PyPI trusted publisher once (https://pypi.org/manage/account/publishing/):
#   project: mycelium-http-tools   owner: LepistaBioinformatics
#   repository: mycelium-sdk-py    workflow: release.yml    environment: pypi
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Build
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
