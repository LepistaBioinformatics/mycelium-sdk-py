name: Release

# Builds the package and publishes it to PyPI (https://pypi.org/project/mycelium-http-tools/)
# whenever a version tag (v*) is pushed — typically created by bump.yml.
#
# Publishing uses PyPI Trusted Publishing (OIDC): no API token is stored. Configure a
# trusted publisher for the "mycelium-http-tools" project on PyPI pointing at this repo,
# workflow "release.yml", and environment "pypi".
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Build
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
